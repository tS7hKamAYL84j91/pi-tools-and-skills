# ollama — Local and cloud LLM model runner

> Run, manage, and inspect LLM models locally or via cloud providers.

## Common operations

- List installed/available models:
  `ollama list`

- Run a model interactively:
  `ollama run {{model-name}}`

- Inspect model capabilities and metadata:
  `ollama show {{model-name}}`

- Pull a model:
  `ollama pull {{model-name}}`

- Serve the API (usually auto-started):
  `ollama serve`

## Patterns

- Current installed model roster and role mappings (all :cloud suffix):
  `glm-5.1:cloud` — Architecting, planning, orchestration fallback
  `qwen3.5:cloud` — Heavy coding, multi-file refactoring
  `gemma4:31b-cloud` — Targeted fixes, edits, simple tasks (default worker)
  `deepseek-v3.2:cloud` — Deep reasoning, logic, chaotic fallback
  `minimax-m2.7:cloud` — Reasoning-capable

- Pi spawn format for Ollama models:
  `spawn_agent model="gemma4:31b-cloud"` (pi auto-prefixes ollama/)

- Detect if a model supports reasoning/thinking:
  `ollama show {{model}} | grep -i "thinking\|reasoning"` (check Capabilities field)

- Cloud models use `:cloud` suffix:
  `ollama run minimax-m2.7:cloud`

- Pi model reference format:
  `ollama/{{model-name}}` (e.g. `ollama/minimax-m2.7:cloud`, `ollama/glm-5.1:cloud`)

- API endpoint for programmatic use:
  `http://localhost:11434/v1` (OpenAI-compatible)

## Gotchas

- deepseek-r1:70b is NOT installed — use deepseek-v3.2:cloud instead
- Model names must match exactly including :cloud suffix
- gemma4 is 31b not 27b — use gemma4:31b-cloud
- qwen3.5 has no size suffix — just qwen3.5:cloud
- Cloud models (`:cloud` suffix) have no local size but are slower and can be unreliable
- Name heuristics (`*think*`, `*reason*`) miss some reasoning models — use `ollama show` to check Capabilities
- `ollama list` shows SIZE as `-` for cloud models
- The OpenAI-compatible API is at `/v1` not `/api` — use `http://localhost:11434/v1`
- Models with `reasoning: true` in pi need `thinkingLevel` set (high recommended)
- Cloud model latency is much higher than local — spawned agents may appear stalled when just slow
