# model-routing — CoAS 3-tier model routing protocol

> Route agent tasks to the right model: Ollama (free) → Gemini (subscription) → Anthropic (fallback).

## Common operations

- Spawn a worker for targeted fixes:
  `spawn_agent model="gemma4:31b-cloud" brief={classification: "sequential", ...}`

- Spawn a worker for heavy coding:
  `spawn_agent model="qwen3.5:cloud" brief={classification: "sequential", ...}`

- Spawn orchestrator/chaotic (Opus preferred):
  `spawn_agent model="claude-opus-4-6" brief={classification: "parallelisable", ...}`

- Spawn research scout:
  `spawn_agent model="google-gemini-cli/gemini-2.5-flash" brief={...}`

## Patterns

- Role → Model routing table:
  Architecting/Planning: `glm-5.1:cloud` → Gemini Pro → **Opus 4.6**
  Heavy Coding: `qwen3.5:cloud` → Gemini Pro → Sonnet 4.6
  Targeted Fixes: `gemma4:31b-cloud` → Gemini Flash → Haiku 4.5
  Deep Reasoning: `deepseek-v3.2:cloud` → Gemini Pro → **Opus 4.6**
  Chaotic: **Opus 4.6** (preferred) → Gemini Pro → `deepseek-v3.2:cloud`
  Orchestration: **Opus 4.6** (preferred) → Gemini Pro → `glm-5.1:cloud`
  Research (broad): — → Gemini Flash (1M ctx) → Haiku 4.5
  Research (deep): — → Gemini Pro (1M ctx) → **Opus 4.6**
  Review/audit: `deepseek-v3.2:cloud` → Gemini Pro → Sonnet 4.6

- Escalation within Tier 1:
  `gemma4:31b-cloud` (2 failures) → `qwen3.5:cloud` → `deepseek-v3.2:cloud` → Tier 2

- Anthropic model strings:
  `claude-opus-4-6`, `claude-sonnet-4-6`, `claude-haiku-4-5`

## Gotchas

- Orchestration and chaotic start at Opus 4.6 — NOT local models
- Gemini Flash 48% empty-response rate, Pro 26% — always poll agent_status every 60s
- Research tasks start at Tier 2 (Gemini) — no local model has 1M context
- All Ollama models use :cloud suffix — exact match required
- deepseek-r1:70b is NOT installed — use deepseek-v3.2:cloud
- Tier 1 is free, Tier 2 subscription, Tier 3 subscription — escalation costs nothing but time
