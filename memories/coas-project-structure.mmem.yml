# coas-project-structure — Repository layout and conventions

> Navigate the three-repo CoAS (Coding Agent System) workspace.

## Common operations

- Find the kanban board:
  `cat ~/git/coas/kanban/board.log`

- View board snapshot:
  `cat ~/git/coas/kanban/snapshot.md`

- Find a research report:
  `ls ~/git/working-notes/research/{{topic}}/REPORT.md`

- Find skills and extensions:
  `ls ~/git/tools-and-skills/skills/`
  `ls ~/git/tools-and-skills/extensions/`

- Check system state:
  `cat ~/git/coas/STATE.md`

## Patterns

- Three-repo layout:
  `~/git/coas/` — orchestrator, kanban board, worker configs
  `~/git/tools-and-skills/` — pi extensions, skills, prompts, lib/
  `~/git/working-notes/` — research output, REPORT.md files, SYNTHESIS.md

- Extension wiring via settings.json:
  `~/git/coas/.pi/settings.json` → loads `project-extensions/kanban`
  `~/.pi/agent/settings.json` → loads `extensions/` from tools-and-skills

- Task files live alongside the board:
  `~/git/coas/kanban/tasks/T-NNN.md`

## Gotchas

- `project-extensions/` in tools-and-skills is loaded by COAS repo, not by tools-and-skills itself
- `extensions/` in tools-and-skills is the global extension dir (loaded via ~/.pi/agent/settings.json)
- Research output goes to `~/git/working-notes/research/{{agent-name}}/REPORT.md`
- Skills are in `~/git/tools-and-skills/skills/{{skill-name}}/SKILL.md`
- The kanban dir is auto-detected: `$KANBAN_DIR` → `~/git/coas/kanban/` → `./kanban/`
- `STATE.md` is in the coas repo root, not working-notes
